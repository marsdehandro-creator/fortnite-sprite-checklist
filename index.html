<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fortnite Sprite Checklist</title>
<style>
  :root {
    --rare: #4a90d9;
    --epic: #a259d9;
    --legendary: #e8912d;
    --mythic: #d9534f;
    --special: #d4af37;
    --bg: #1b1d24;
    --card: #262932;
    --chip: #1f222a;
    --text: #eee;
    --dim: #888;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
    background:
      radial-gradient(circle at 8% 8%, rgba(74,144,217,0.32), transparent 30%),
      radial-gradient(circle at 92% 6%, rgba(162,89,217,0.30), transparent 32%),
      radial-gradient(circle at 88% 92%, rgba(232,145,45,0.26), transparent 35%),
      radial-gradient(circle at 6% 90%, rgba(217,83,79,0.26), transparent 32%),
      radial-gradient(circle at 50% 45%, rgba(212,175,55,0.12), transparent 55%),
      linear-gradient(180deg, #14151c, #1b1d24 45%, #171922);
    background-attachment: fixed;
  }
  h1 {
    text-align: center;
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--rare), var(--epic), var(--legendary), var(--mythic));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle { text-align: center; color: var(--dim); margin-bottom: 20px; font-size: 14px; }

  .tabs {
    max-width: 1000px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: center;
    gap: 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #444;
    width: fit-content;
  }
  .tabs button {
    padding: 10px 22px;
    border: none;
    background: #262932;
    color: var(--text);
    cursor: pointer;
    font-size: 15px;
  }
  .tabs button.active {
    background: var(--rare);
    color: #fff;
  }

  .progress-wrap {
    max-width: 1000px;
    margin: 0 auto 20px;
    text-align: center;
  }
  .progress-bar {
    background: #000;
    border-radius: 8px;
    height: 18px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a90d9, #a259d9, #e8912d);
    width: 0%;
    transition: width 0.3s ease;
  }
  .controls {
    max-width: 1000px;
    margin: 0 auto 24px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  input[type="text"] {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #12141a;
    color: var(--text);
    min-width: 220px;
  }
  button {
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    background: #3a3d4a;
    color: var(--text);
    cursor: pointer;
  }
  button:hover { background: #4a4d5a; }
  .filter-group {
    display: flex;
    gap: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #444;
  }
  .filter-group button {
    border-radius: 0;
  }
  .filter-group button.active {
    background: #4a90d9;
    color: #fff;
  }

  .rarity-filters {
    max-width: 1000px;
    margin: 0 auto 24px;
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .rarity-chip-btn {
    padding: 6px 14px;
    border-radius: 16px;
    background: transparent;
    color: var(--dim);
    font-size: 13px;
    font-weight: 600;
  }
  .rarity-chip-btn.rare { border: 2px solid var(--rare); }
  .rarity-chip-btn.epic { border: 2px solid var(--epic); }
  .rarity-chip-btn.legendary { border: 2px solid var(--legendary); }
  .rarity-chip-btn.mythic { border: 2px solid var(--mythic); }
  .rarity-chip-btn.special { border: 2px solid var(--special); }
  .rarity-chip-btn.rare.active { background: #4a90d9; color: #fff; box-shadow: 0 0 8px rgba(74,144,217,0.6); }
  .rarity-chip-btn.epic.active { background: #a259d9; color: #fff; box-shadow: 0 0 8px rgba(162,89,217,0.6); }
  .rarity-chip-btn.legendary.active { background: #e8912d; color: #fff; box-shadow: 0 0 8px rgba(232,145,45,0.6); }
  .rarity-chip-btn.mythic.active { background: #d9534f; color: #fff; box-shadow: 0 0 8px rgba(217,83,79,0.6); }
  .rarity-chip-btn.special.active { background: #d4af37; color: #1b1d24; box-shadow: 0 0 8px rgba(212,175,55,0.6); }

  .grid-wrap {
    max-width: 1000px;
    margin: 0 auto;
  }

  .family-card {
    position: relative;
    background-color: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    border: 2px solid transparent;
    transition: background-color 0.2s, border-color 0.2s;
  }
  .family-card.complete {
    background-color: rgba(92, 214, 92, 0.10);
    border-color: rgba(92, 214, 92, 0.85);
  }
  .family-card.incomplete {
    background-color: rgba(224, 102, 102, 0.07);
    border-color: rgba(224, 102, 102, 0.5);
  }

  .crown-badge {
    position: absolute;
    top: -12px;
    right: 12px;
    width: 34px;
    height: 26px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.55));
  }
  .crown-icon .crown-whole,
  .crown-icon .crown-broken {
    display: none;
  }
  .family-card.complete .crown-icon .crown-whole {
    display: inline;
  }
  .family-card.incomplete .crown-icon .crown-broken {
    display: inline;
  }
  .family-card.complete .crown-badge {
    filter: drop-shadow(0 0 6px rgba(92,214,92,0.65)) drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }
  .family-card.incomplete .crown-badge {
    opacity: 0.8;
    filter: grayscale(0.35) drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }
  .family-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .family-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #12141a;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }
  .family-title {
    font-size: 17px;
    font-weight: 600;
    flex: 1;
  }
  .family-count {
    font-size: 13px;
    color: var(--dim);
  }

  .variant-strip {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .variant-chip {
    position: relative;
    width: 96px;
    background: var(--chip);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
    border: 2px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s, opacity 0.2s;
  }
  .variant-chip.rare { border-color: var(--rare); }
  .variant-chip.epic { border-color: var(--epic); }
  .variant-chip.legendary { border-color: var(--legendary); }
  .variant-chip.mythic { border-color: var(--mythic); }
  .variant-chip.special { border-color: var(--special); }

  .variant-chip img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    background: #12141a;
    border-radius: 6px;
    margin-bottom: 6px;
    transition: filter 0.2s;
  }
  .variant-chip.locked img {
    filter: grayscale(1) brightness(0.4);
  }
  .variant-chip .variant-label {
    font-size: 12px;
    display: block;
  }
  .lock-icon, .check-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    font-size: 13px;
    line-height: 1;
    display: none;
  }
  .variant-chip.locked .lock-icon {
    display: block;
  }
  .variant-chip:not(.locked) .check-badge {
    background: #2e8b3a;
    color: #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }
  .variant-chip.holofoil:not(.locked) {
    background: linear-gradient(120deg, #2a2d38, #3a3350, #2a2d38);
    background-size: 200% 200%;
    animation: shimmer 3s ease infinite;
  }
  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Unreleased tab */
  .unreleased-note {
    max-width: 1000px;
    margin: 0 auto 20px;
    text-align: center;
    color: var(--dim);
    font-size: 14px;
  }
  .variant-chip.unreleased {
    cursor: default;
    opacity: 0.85;
  }
  .variant-chip.unreleased img {
    filter: grayscale(1) brightness(0.55);
  }
  .variant-chip.unreleased .variant-label {
    color: var(--dim);
  }
  .coming-soon-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    font-size: 9px;
    background: #444;
    color: #ccc;
    border-radius: 4px;
    padding: 1px 4px;
  }
  #spriteRain {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }
  .rain-sprite {
    position: absolute;
    top: -10%;
    animation-name: spriteFall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    will-change: transform;
  }
  @keyframes spriteFall {
    0% { transform: translateY(-10vh) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(360deg); }
  }
  .page-content {
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<div id="spriteRain"></div>

<div class="page-content">
<h1>Fortnite Sprite Checklist</h1>
<div class="subtitle">Grouped by sprite family &middot; variants shown left to right</div>

<div class="tabs">
  <button id="tabReleased" class="active">Released</button>
  <button id="tabUnreleased">Unreleased</button>
</div>

<div class="progress-wrap" id="progressWrap">
  <div id="progressText">0 / 0 collected</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="controls" id="controls">
  <input type="text" id="search" placeholder="Search sprites...">
  <div class="filter-group">
    <button id="filterAll" class="active">Show All</button>
    <button id="filterCollected">Show Collected</button>
    <button id="filterOutstanding">Show Outstanding</button>
  </div>
  <button id="resetAll">Reset All</button>
</div>

<div class="rarity-filters" id="rarityFilters"></div>

<div class="unreleased-note" id="unreleasedNote" style="display:none;">
  Sprites shown here aren't obtainable yet — showcased for reference only, no progress tracking.
</div>

<div class="grid-wrap" id="releasedView"></div>
<div class="grid-wrap" id="unreleasedView" style="display:none;"></div>
</div>

const familyNames = {
  water: "Water", earth: "Earth", fire: "Fire", fishy: "Fishy", duck: "Duck",
  ghost: "Ghost", demon: "Demon", king: "King", striker: "Striker", aura: "Aura",
  dream: "Dream", punk: "Punk", boss: "Boss", zeropoint: "Zero Point",
  theburntpeanut: "Burnt Peanut", grim: "Grim", air: "Air", seven: "Seven", wick: "John Wick",
};
const familyOrder = ["water","earth","fire","fishy","duck","ghost","demon","king","striker","aura",
  "dream","punk","boss","zeropoint","theburntpeanut","grim","air","seven","wick"];
const variantOrder = ["basic","gold","candy","galaxy","holofoil","gem","rift"];
const variantLabels = { gold: "Gold", candy: "Gummy", galaxy: "Galaxy", holofoil: "Holofoil", gem: "Gem", rift: "Rift" };

const STORAGE_KEY = "fortniteSpriteChecklist";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function groupByFamily(list) {
  const groups = {};
  list.forEach(s => {
    (groups[s.family] = groups[s.family] || []).push(s);
  });
  return familyOrder
    .filter(f => groups[f])
    .map(f => ({
      family: f,
      title: familyNames[f] || f,
      items: groups[f].slice().sort((a, b) => variantOrder.indexOf(a.variant) - variantOrder.indexOf(b.variant)),
    }));
}

function crownBadgeMarkup(family) {

  return `

        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff3b0"/>
            <stop offset="55%" stop-color="#e8c14a"/>
            <stop offset="100%" stop-color="#b8860b"/>
          </linearGradient>
        </defs>
        <g class="crown-whole">
          <path d="M4 10 L9 16 L23 16 L28 10 L22 13 L16 6 L10 13 Z" fill="url(#${gradId})" stroke="#8a6d1f" stroke-width="0.6" stroke-linejoin="round"/>
          <rect x="7" y="16" width="18" height="3" rx="1.2" fill="#caa23a" stroke="#8a6d1f" stroke-width="0.5"/>
          <circle cx="16" cy="9" r="1.4" fill="#fff6d8"/>
          <circle cx="9.5" cy="12.5" r="1" fill="#fff6d8"/>
          <circle cx="22.5" cy="12.5" r="1" fill="#fff6d8"/>
        </g>
        <g class="crown-broken">
          <path d="M4 10 L9 16 L14 16 L12.5 12.8 L16 6 L18 10.8 L23 16 L28 10 L22 13 L16.4 7.2 L10 13 Z" fill="url(#${gradId})" stroke="#5a4d2f" stroke-width="0.6" stroke-linejoin="round" opacity="0.85"/>
          <rect x="7" y="16" width="18" height="3" rx="1.2" fill="#8a7a58" stroke="#5a4d2f" stroke-width="0.5"/>
          <circle cx="9.5" cy="12.5" r="1" fill="#e9e2c8" opacity="0.7"/>
          <circle cx="22.5" cy="12.5" r="1" fill="#e9e2c8" opacity="0.7"/>
          <path d="M14.5 7.5 L16.5 10.5 L15 12 L17 15.5" stroke="#e05d5d" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </svg>
    </div>`;
}

function buildReleasedView() {
  const container = document.getElementById("releasedView");
  container.innerHTML = "";
  groupByFamily(sprites).forEach(group => {
    const card = document.createElement("div");
    card.className = "family-card";
    card.dataset.family = group.family;
    card.insertAdjacentHTML("afterbegin", crownBadgeMarkup(group.family));

    const header = document.createElement("div");
    header.className = "family-header";

    const icon = document.createElement("div");
    icon.className = "family-icon";
    const basicItem = group.items.find(i => i.variant === "basic") || group.items[0];
    icon.style.backgroundImage = `url(${IMG_BASE}${basicItem.id}.png)`;

    const title = document.createElement("div");
    title.className = "family-title";
    title.textContent = group.title;

    const count = document.createElement("div");
    count.className = "family-count";
    count.dataset.role = "family-count";

    header.appendChild(icon);
    header.appendChild(title);
    header.appendChild(count);
    card.appendChild(header);

    const strip = document.createElement("div");
    strip.className = "variant-strip";

    group.items.forEach(sprite => {
      const id = sprite.id;
      const chip = document.createElement("div");
      const colorClass = sprite.variant === "basic" ? sprite.rarity.toLowerCase() : "special";
      chip.className = "variant-chip " + colorClass + (sprite.variant === "holofoil" ? " holofoil" : "");
      chip.dataset.id = id;
      chip.dataset.name = sprite.name.toLowerCase();

      const img = document.createElement("img");
      img.src = IMG_BASE + id + ".png";
      img.alt = sprite.name;
      img.loading = "lazy";

      const label = document.createElement("span");
      label.className = "variant-label";
      label.textContent = sprite.variant === "basic" ? sprite.rarity : variantLabels[sprite.variant];
      chip.dataset.label = label.textContent;

      const lockIcon = document.createElement("span");
      lockIcon.className = "lock-icon";
      lockIcon.textContent = "\u{1F512}";

      const checkBadge = document.createElement("span");
      checkBadge.className = "check-badge";
      checkBadge.textContent = "✓";

      chip.appendChild(img);
      chip.appendChild(label);
      chip.appendChild(lockIcon);
      chip.appendChild(checkBadge);

      const checked = !!state[id];
      chip.classList.toggle("locked", !checked);

      function toggle() {
        state[id] = !state[id];
        chip.classList.toggle("locked", !state[id]);
        save();
        updateProgress();
        updateFilterCounts();
        applyFilters();
      }
      chip.addEventListener("click", toggle);

      strip.appendChild(chip);
    });

    card.appendChild(strip);
    container.appendChild(card);
  });
}

function buildUnreleasedView() {
  const container = document.getElementById("unreleasedView");
  container.innerHTML = "";
  groupByFamily(unreleasedSprites).forEach(group => {
    const card = document.createElement("div");
    card.className = "family-card";

    const header = document.createElement("div");
    header.className = "family-header";

    const icon = document.createElement("div");
    icon.className = "family-icon";
    const basicItem = group.items.find(i => i.variant === "basic") || group.items[0];
    icon.style.backgroundImage = `url(${IMG_BASE}${basicItem.id}.png)`;

    const title = document.createElement("div");
    title.className = "family-title";
    title.textContent = group.title;

    header.appendChild(icon);
    header.appendChild(title);
    card.appendChild(header);

    const strip = document.createElement("div");
    strip.className = "variant-strip";

    group.items.forEach(sprite => {
      const chip = document.createElement("div");
      chip.className = "variant-chip unreleased";

      const img = document.createElement("img");
      img.src = IMG_BASE + sprite.id + ".png";
      img.alt = sprite.name;
      img.loading = "lazy";
      img.onerror = () => { img.style.visibility = "hidden"; };

      const label = document.createElement("span");
      label.className = "variant-label";
      label.textContent = sprite.variant === "basic" ? sprite.rarity : variantLabels[sprite.variant];

      const badge = document.createElement("span");
      badge.className = "coming-soon-badge";
      badge.textContent = "SOON";

      chip.appendChild(img);
      chip.appendChild(label);
      chip.appendChild(badge);
      strip.appendChild(chip);
    });

    card.appendChild(strip);
    container.appendChild(card);
  });
}

function updateProgress() {
  const all = document.querySelectorAll("#releasedView .variant-chip");
  const checked = document.querySelectorAll("#releasedView .variant-chip:not(.locked)");
  document.getElementById("progressText").textContent = `${checked.length} / ${all.length} collected`;
  document.getElementById("progressFill").style.width = all.length ? (checked.length / all.length * 100) + "%" : "0%";

  document.querySelectorAll("#releasedView .family-card").forEach(card => {
    const total = card.querySelectorAll(".variant-chip").length;
    const got = card.querySelectorAll(".variant-chip:not(.locked)").length;
    card.querySelector('[data-role="family-count"]').textContent = `${got} / ${total}`;
    card.classList.toggle("complete", got === total);
    card.classList.toggle("incomplete", got < total);
  });
}

let filterMode = "all";
const filterButtons = {
  all: document.getElementById("filterAll"),
  collected: document.getElementById("filterCollected"),
  outstanding: document.getElementById("filterOutstanding"),
};
const filterLabels = { all: "Show All", collected: "Show Collected", outstanding: "Show Outstanding" };

function updateFilterCounts() {
  const total = document.querySelectorAll("#releasedView .variant-chip").length;
  const collected = document.querySelectorAll("#releasedView .variant-chip:not(.locked)").length;
  const counts = { all: total, collected: collected, outstanding: total - collected };
  Object.entries(filterButtons).forEach(([mode, btn]) => {
    btn.textContent = `${filterLabels[mode]} (${counts[mode]})`;
  });
}

const RARITY_FILTER_LABELS = [
  { label: "Rare", cls: "rare" },
  { label: "Epic", cls: "epic" },
  { label: "Legendary", cls: "legendary" },
  { label: "Mythic", cls: "mythic" },
  { label: "Gold", cls: "special" },
  { label: "Gummy", cls: "special" },
  { label: "Galaxy", cls: "special" },
  { label: "Holofoil", cls: "special" },
];
const activeRarityLabels = new Set(RARITY_FILTER_LABELS.map(r => r.label));

function buildRarityFilters() {
  const wrap = document.getElementById("rarityFilters");
  RARITY_FILTER_LABELS.forEach(({ label, cls }) => {
    const btn = document.createElement("button");
    btn.className = `rarity-chip-btn ${cls} active`;
    btn.textContent = label;
    btn.addEventListener("click", () => {
      if (activeRarityLabels.has(label)) {
        activeRarityLabels.delete(label);
        btn.classList.remove("active");
      } else {
        activeRarityLabels.add(label);
        btn.classList.add("active");
      }
      applyFilters();
    });
    wrap.appendChild(btn);
  });
}

function applyFilters() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  document.querySelectorAll("#releasedView .variant-chip").forEach(chip => {
    const matchesSearch = !q || chip.dataset.name.includes(q);
    const isLocked = chip.classList.contains("locked");
    const matchesFilter =
      filterMode === "all" ||
      (filterMode === "collected" && !isLocked) ||
      (filterMode === "outstanding" && isLocked);
    const matchesRarity = activeRarityLabels.has(chip.dataset.label);
    chip.style.display = (matchesSearch && matchesFilter && matchesRarity) ? "" : "none";
  });
  document.querySelectorAll("#releasedView .family-card").forEach(card => {
    const anyVisible = [...card.querySelectorAll(".variant-chip")].some(c => c.style.display !== "none");
    card.style.display = anyVisible ? "" : "none";
  });
}

document.getElementById("search").addEventListener("input", applyFilters);

Object.entries(filterButtons).forEach(([mode, btn]) => {
  btn.addEventListener("click", () => {
    filterMode = mode;
    Object.values(filterButtons).forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  });
});

document.getElementById("resetAll").addEventListener("click", () => {
  if (!confirm("Reset all collected sprites?")) return;
  state = {};
  save();
  document.querySelectorAll("#releasedView .variant-chip").forEach(chip => {
    chip.classList.add("locked");
  });
  updateProgress();
  updateFilterCounts();
  applyFilters();
});

const tabReleased = document.getElementById("tabReleased");
const tabUnreleased = document.getElementById("tabUnreleased");
const releasedView = document.getElementById("releasedView");
const unreleasedView = document.getElementById("unreleasedView");
const progressWrap = document.getElementById("progressWrap");
const controls = document.getElementById("controls");
const rarityFilters = document.getElementById("rarityFilters");
const unreleasedNote = document.getElementById("unreleasedNote");

tabReleased.addEventListener("click", () => {
  tabReleased.classList.add("active");
  tabUnreleased.classList.remove("active");
  releasedView.style.display = "";
  unreleasedView.style.display = "none";
  progressWrap.style.display = "";
  controls.style.display = "";
  rarityFilters.style.display = "";
  unreleasedNote.style.display = "none";
});
tabUnreleased.addEventListener("click", () => {
  tabUnreleased.classList.add("active");
  tabReleased.classList.remove("active");
  unreleasedView.style.display = "";
  releasedView.style.display = "none";
  progressWrap.style.display = "none";
  controls.style.display = "none";
  rarityFilters.style.display = "none";
  unreleasedNote.style.display = "";
});

function buildSpriteRain() {
  const rainIds = ["water_basic","earth_basic","fire_basic","fishy_basic","duck_basic","ghost_basic",
    "demon_basic","king_basic","striker_basic","aura_basic","dream_basic","punk_basic","boss_basic",
    "zeropoint_basic","grim_basic"];
  const container = document.getElementById("spriteRain");
  const count = 22;
  for (let i = 0; i < count; i++) {
    const id = rainIds[Math.floor(Math.random() * rainIds.length)];
    const img = document.createElement("img");
    img.className = "rain-sprite";
    img.src = IMG_BASE + id + ".png";
    img.alt = "";
    const size = 24 + Math.random() * 40;
    const duration = 12 + Math.random() * 16;
    const delay = -Math.random() * duration;
    const left = Math.random() * 100;
    const opacity = 0.08 + Math.random() * 0.14;
    img.style.left = left + "vw";
    img.style.width = size + "px";
    img.style.opacity = opacity;
    img.style.animationDuration = duration + "s";
    img.style.animationDelay = delay + "s";
    container.appendChild(img);
  }
}

buildReleasedView();
buildUnreleasedView();
buildRarityFilters();
buildSpriteRain();
updateProgress();
updateFilterCounts();
applyFilters();
</script>

</body>
</html>
